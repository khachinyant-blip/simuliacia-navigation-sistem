<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ռոբոտի Ինտելեկտուալ Նավիգացիա</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Շարժական ռոբոտի նավիգացիոն համակարգ</h1>
        <div class="menu">
            <select id="algoSelect">
                <option value="dijkstra">Dijkstra Algorithm</option>
                <option value="astar">A* Algorithm</option>
            </select>
            <button id="startBtn" class="btn-primary">Սկսել</button>
            <button id="mazeBtn" class="btn-info">Լաբիրինթոս</button>
            <button id="clearBtn" class="btn-secondary">Մաքրել</button>
        </div>
        <div class="controls">
            Արագություն: <input type="range" id="speedRange" min="1" max="100" value="85">
            <label class="switch-label">
                <input type="checkbox" id="dynamicCheck"> Դինամիկ ռեժիմ
            </label>
        </div>
        <div class="stats-board">
            <div class="stat-box">Ճանապարհի ծախս: <span id="pathLength">0</span></div>
            <div class="stat-box">Ստուգված վանդակներ: <span id="visitedCount">0</span></div>
        </div>
    </div>

    <div id="grid-container"></div>

    <div class="legend">
        <div class="legend-item"><div class="legend-box node-start"></div><span>Ռոբոտ</span></div>
        <div class="legend-item"><div class="legend-box node-end"></div><span>Վերջնակետ</span></div>
        <div class="legend-item"><div class="legend-box node-wall"></div><span>Արգելք</span></div>
        <div class="legend-item"><div class="legend-box node-weight"></div><span>Ավազ (3x)</span></div>
        <div class="legend-item"><div class="legend-box node-path"></div><span>Հետագիծ</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

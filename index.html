<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Ռոբոտի Նավիգացիա</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Շարժական ռոբոտի նավիգացիա</h1>
        <div class="menu">
            <select id="algoSelect">
                <option value="astar">A* ալգորիթմ</option>
                <option value="dijkstra">Դեյքստրայի ալգորիթմ</option>
            </select>
            <button id="startBtn">Սկսել</button>
            <button id="mazeBtn">Լաբիրինթոս</button>
            <button id="clearBtn">Մաքրել</button>
        </div>
        <div class="stats">
            <div>Ճանապարհի ծախս: <span id="pathLength">0</span></div>
            <div>Ստուգված վանդակներ: <span id="visitedCount">0</span></div>
        </div>
    </div>

    <div id="grid-container"></div>

    <div class="legend">
        <div class="legend-item"><div class="box start"></div> Ռոբոտ</div>
        <div class="legend-item"><div class="box end"></div> Վերջնակետ</div>
        <div class="legend-item"><div class="box wall"></div> Պատ</div>
        <div class="legend-item"><div class="box sand"></div> Ավազ (x3)</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
